<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Warm background (optional, but keep it transparent and clean for tabs) -->
  
  <!-- Vapor / Steam -->
  <path d="M 24 10 C 24 8, 26 6, 26 4" stroke="#c5a059" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 30 12 C 30 9, 32 7, 32 5" stroke="#c5a059" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Bombilla (Metal Straw) -->
  <path d="M 38 22 L 52 4 L 54 6 M 50 2 L 54 6" stroke="#b0bec5" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Gold detail on bombilla tip (boquilla) -->
  <path d="M 52 4 L 54 6" stroke="#c5a059" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Mate Gourd (Body) -->
  <!-- Dark leather base/bottom shadow -->
  <path d="M 16 38 C 16 52, 48 52, 48 38 C 48 28, 44 26, 38 26 L 26 26 C 20 26, 16 28, 16 38 Z" fill="#4e2e1a" />
  <!-- Leather body (middle color) -->
  <path d="M 18 36 C 18 48, 46 48, 46 36 C 46 28, 42 26, 36 26 L 28 26 C 22 26, 18 28, 18 36 Z" fill="#6c4731" />
  
  <!-- Uruguayan Hand-stitches (Traditional Details) -->
  <path d="M 32 26 L 32 48" stroke="#1f0f08" stroke-width="2" stroke-dasharray="2,3" stroke-linecap="round"/>
  <path d="M 24 30 L 26 31 M 24 36 L 26 37 M 24 42 L 26 43" stroke="#c5a059" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 40 30 L 38 31 M 40 36 L 38 37 M 40 42 L 38 43" stroke="#c5a059" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Virola (Chiseled Silver Ring on top) -->
  <!-- Silver base ring -->
  <path d="M 22 26 C 22 23, 42 23, 42 26 C 44 26, 44 27, 42 28 C 38 29, 26 29, 22 28 C 20 27, 20 26, 22 26 Z" fill="#cfd8dc" />
  <!-- Alpaca highlighted top lip -->
  <ellipse cx="32" cy="25" rx="9" ry="2" fill="#eceff1" />
  <ellipse cx="32" cy="25" rx="7" ry="1.2" fill="#1f0f08" />

  <!-- Sol de Mayo Small Badge in center of body -->
  <circle cx="32" cy="36" r="3" fill="#c5a059" />
  <path d="M 32 31 L 32 41 M 27 36 L 37 36 M 28.5 32.5 L 35.5 39.5 M 28.5 39.5 L 35.5 32.5" stroke="#c5a059" stroke-width="0.8" />
</svg>